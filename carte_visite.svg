  <!-- Logo Organon (Reliques de la Mort) -->
  <g transform="translate(70, 260)">
    <line x1="0" y1="-120" x2="0" y2="50" stroke="#CD7F32" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#CD7F32" stroke-width="5"/>
    <polygon points="0,-120 95,50 -95,50" fill="none" stroke="#CD7F32" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <!-- Nom -->
  <text x="175" y="130" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" font-weight="bold" letter-spacing="2">Aristote LUBALA</text>

  <!-- Titre -->
  <text x="175" y="170" font-family="Georgia, serif" font-size="18" fill="#CD7F32" letter-spacing="3">FONDATEUR</text>

  <!-- Organisation -->
