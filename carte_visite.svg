    <rect x="730" y="180" width="20" height="20"/>
    <rect x="800" y="180" width="20" height="20"/>
    <rect x="730" y="250" width="20" height="20"/>
    <rect x="800" y="250" width="20" height="20"/>
    <rect x="765" y="215" width="15" height="15"/>
    <rect x="730" y="215" width="10" height="10"/>
    <rect x="800" y="215" width="10" height="10"/>
    <rect x="760" y="180" width="8" height="8"/>
