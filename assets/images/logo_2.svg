<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  
  <!-- Baguette verticale -->
  <line x1="100" y1="10" x2="100" y2="180" 
    stroke="#374151" stroke-width="4" 
    stroke-linecap="round"
    stroke-dasharray="170" stroke-dashoffset="170">
    <animate attributeName="stroke-dashoffset" 
      from="170" to="0" 
      dur="0.8s" begin="0s" fill="freeze"/>
  </line>

  <!-- Cercle Pierre -->
  <circle cx="100" cy="120" r="45" 
    fill="none" stroke="#374151" stroke-width="4" 
    stroke-dasharray="283" stroke-dashoffset="283">
    <animate attributeName="stroke-dashoffset" 
      from="283" to="0" 
      dur="0.8s" begin="0.8s" fill="freeze"/>
  </circle>

  <!-- Triangle Cape -->
  <polygon points="100,10 190,180 10,180" 
    fill="none" stroke="#374151" stroke-width="4" 
    stroke-linejoin="round" stroke-miterlimit="1.1"
    stroke-dasharray="565" stroke-dashoffset="565">
    <animate attributeName="stroke-dashoffset" 
      from="565" to="0" 
      dur="1.2s" begin="1.6s" fill="freeze"/>
  </polygon>

  <!-- Texte ORGANON DATA SOLUTIONS -->
  <text x="100" y="215" 
    text-anchor="middle" 
    font-family="Arial Black, Arial, sans-serif" 
    font-size="14" 
    font-weight="bold" 
    fill="#374151" 
    letter-spacing="2">
    ORGANON DATA SOLUTIONS
  </text>

</svg>